<!-- Updated login.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BookNest</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">📚 BookNest</div>

        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="login.html" class="active">Login</a>
            <a href="register.html">Register</a>
        </nav>

        <div class="menu-toggle" id="menuToggle">☰</div>
    </header>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-container">

         
            <div class="login-form-box">
                <h1>Welcome Back</h1>
                <p>Login to access your library dashboard</p>

                <!-- Connected Form -->
                <form action="dashboard.html" method="GET" class="login-form">

                    <input type="text" name="username" placeholder="Username or Email" required>

                    <input type="password" name="password" placeholder="Password" required>

                    <!-- Login Button Redirects to Dashboard -->
                    <button type="submit" class="btn primary-btn">Login</button>

                    <p class="register-link">
                        Don't have an account?
                        <a href="register.html">Register here</a>
                    </p>

                </form>

                
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 BookNest | College Library Management System</p>
    </footer>

</body>

</html>
