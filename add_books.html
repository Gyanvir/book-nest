<!-- add_books.html — Admin only: redirects to Module 3 Admin Dashboard -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add books to the library — BookNest Admin.">
    <title>Add Books | BookNest</title>
    <link rel="stylesheet" href="style.css">

    <!-- Module 2: Session Guard (admin only) -->
    <script src="js/auth.js"></script>
    <script src="js/session-guard.js"></script>

    <!-- Auto-redirect to admin dashboard -->
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            // Small delay so user sees the redirect message
            setTimeout(function () {
                window.location.href = 'admin/';
            }, 1800);
        });

</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">📚 BookNest</div>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html" class="logout-btn">Logout</a>
        </nav>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
    </header>

    <!-- Redirect Notice -->
    <section>
        <div class="add-books-container" style="text-align:center;">
            <h1>📖 Add / Manage Books</h1>
            <p>Book management is handled by the <strong>Admin Dashboard</strong> (Module 3).</p>
            <p style="color:var(--bn-brown-light);font-size:13px;">Redirecting you there now…</p>
            <div style="margin-top:8px;">
                <div class="spinner" style="margin:0 auto 16px;"></div>
            </div>
            <a href="admin/" class="btn primary-btn">Go to Admin Dashboard</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 BookNest | College Library Management System</p>
    </footer>

</body>

</html>
