<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Materials | BookNest</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">📚 BookNest</div>

        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html">Logout</a>
        </nav>

        <div class="menu-toggle" id="menuToggle">☰</div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <div class="search-container">

            <h1>Search Library Materials</h1>
            <p>Find books, notes, previous year question papers, journals and more.</p>

            <!-- Search Form -->
            <form action="#" method="GET" class="search-form">

                <!-- Search Input -->
                <input type="text" name="search_query" placeholder="Search by title, author, ISBN, keyword..." required>

                <!-- Category Dropdown -->
                <select name="material_type" required>
                    <option value="">Select Material Type</option>
                    <option value="all">All Materials</option>
                    <option value="books">Books</option>
                    <option value="notes">Notes</option>
                    <option value="pyqs">Previous Year Question Papers</option>
                    <option value="journals">Journals</option>
                    <option value="magazines">Magazines</option>
                </select>

                <!-- Search Button -->
                <button type="submit" class="btn primary-btn">Search</button>

            </form>

           
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 BookNest | College Library Management System</p>
    </footer>

</body>

</html>
