<!-- Updated register.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BookNest</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">📚 BookNest</div>

        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="active">Register</a>
        </nav>

        <div class="menu-toggle" id="menuToggle">☰</div>
    </header>

    <!-- Register Section -->
    <section class="register-section">
        <div class="register-container">

            

            <!-- Register Form -->
            <div class="register-form-box">
                <h1>Create Account</h1>
                <p>Join BookNest and access your college library system</p>

                <!-- Connected Form -->
                <form action="login.html" method="GET" class="register-form">

                    <input type="text" name="fullname" placeholder="Full Name" required>

                    <input type="email" name="email" placeholder="Email Address" required>

                    <input type="text" name="username" placeholder="Username" required>

                    <input type="password" name="password" placeholder="Password" required>

                    <input type="password" name="confirm_password" placeholder="Confirm Password" required>

                    <!-- Register Button Redirects to Login -->
                    <button type="submit" class="btn primary-btn"><a href="login.html" style="text-decoration: none; color: white;">Register</a></button>

                    <p class="login-link">
                        Already have an account?
                        <a href="login.html">Login here</a>
                    </p>

                </form>

                
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 BookNest | College Library Management System</p>
    </footer>

</body>

</html>
