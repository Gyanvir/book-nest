
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to BookNest — College Library Management System.">
    <title>Login | BookNest</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <!-- Module 2: Auth Logic -->
    <script defer src="js/auth.js"></script>
    <script defer src="js/login-handler.js"></script>
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">📚 BookNest</div>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="login.html" class="active">Login</a>
            <a href="register.html">Register</a>
        </nav>
        <div class="menu-toggle" id="menuToggle">☰</div>
    </header>

    <!-- Login Section -->
    <section>
        <div class="login-container">
            <h1>Welcome Back</h1>
            <p>Login to access your library dashboard</p>

                <!-- Alert Box -->
                <div class="alert-box" id="loginAlert"></div>

                <!-- Login Form (no action — handled by JS) -->
                <form id="loginForm" class="login-form" novalidate>

                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="usernameOrEmail"
                            name="usernameOrEmail"
                            placeholder="Username or Email"
                            autocomplete="username"
                            required
                        >
                    </div>
                    <span class="error-msg" id="err-usernameOrEmail"></span>

                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="loginPassword"
                            name="password"
                            placeholder="Password"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-pw" id="toggleLoginPw" aria-label="Show/Hide password">👁️</button>
                    </div>
                    <span class="error-msg" id="err-password"></span>

                    <button type="submit" class="btn primary-btn" id="loginBtn">Login</button>

                    <p class="register-link">
                        Don't have an account?
                        <a href="register.html">Register here</a>
                    </p>

                </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 BookNest | College Library Management System</p>
    </footer>

</body>
</html>
